# Netlify build config for KaziNBudget.

[build]
  # Canonical Convex + Netlify pattern with belt-and-suspenders codegen.
  #
  # Why the explicit `convex codegen` before `convex deploy`:
  #   app/backend/_generated/ is gitignored. On CI it starts empty. The web
  #   build (`tsc -b`) imports @backend/_generated/api from 6+ files, so
  #   those types must exist before `pnpm run build` runs. Relying on
  #   `convex deploy --cmd` alone was observed to skip codegen on some
  #   convex CLI versions, so we run codegen explicitly first.
  #
  # Why `pnpm exec convex` instead of `npx convex`:
  #   pnpm exec uses the version pinned in app/backend/package.json
  #   (^1.21.0) rather than pulling the latest tag off npm. Avoids CLI
  #   behavior drift between builds.
  #
  # `convex deploy --cmd '<frontend build>'` then:
  #   - runs the frontend build with VITE_CONVEX_URL set to the deploy URL
  #   - deploys Convex functions to production atomically with the release
  #
  # One-time Netlify setup: add CONVEX_DEPLOY_KEY (Convex dashboard →
  # Settings → Deploy Keys → Production) to Site settings → Environment
  # variables. That key IS a real secret — do not add it to
  # SECRETS_SCAN_OMIT_KEYS.
  command = "mkdir -p $CONVEX_TMPDIR && cd app/backend && pnpm exec convex codegen && pnpm exec convex deploy --cmd 'cd ../../app/web && pnpm run build'"

  # Post-refactor path (web/ → app/web/). The UI still had the old web/dist
  # from before the move; this overrides it.
  publish = "app/web/dist"

[build.environment]
  # Netlify's /tmp lives on a different filesystem than /opt/build/repo,
  # which triggers a noisy warning from convex codegen. Point Convex's
  # temp dir at a folder inside the build root so both paths share a
  # filesystem. The build command `mkdir -p`s this before running anything.
  CONVEX_TMPDIR = "/opt/build/repo/.convex-tmp"

  # These VITE_* vars are inlined into the client bundle by design (Vite
  # exposes them to the browser). Each is the PUBLIC / publishable variant of
  # its service and is safe to ship:
  #   - VITE_CLERK_PUBLISHABLE_KEY  — Clerk's client-safe key (pk_*)
  #   - VITE_CONVEX_URL             — Public Convex deployment URL
  #   - VITE_CONVEX_SITE_URL        — Public Convex HTTP actions base URL
  #   - VITE_GOOGLE_MAPS_API_KEY    — Public Maps key, secured by HTTP
  #                                   referrer restrictions in GCP
  # NEVER add a secret key (sk_*, service-role tokens, Convex deploy keys,
  # etc.) to this list — the scanner's job is to catch those.
  SECRETS_SCAN_OMIT_KEYS = "VITE_CLERK_PUBLISHABLE_KEY,VITE_CONVEX_URL,VITE_CONVEX_SITE_URL,VITE_GOOGLE_MAPS_API_KEY"
